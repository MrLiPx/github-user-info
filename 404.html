<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Not Found · GitHub User Search</title>
  <meta name="description" content="This page doesn't exist.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://mrlipx.github.io/github-user-search/">
  <link rel="icon" type="image/png" href="https://mrlipx.github.io/github-user-search/assets/logo.png">
  <meta name="theme-color" content="#4b9cf5">
  <meta name="color-scheme" content="dark">

  <!-- Fonts — CDN, always absolute, path-independent -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- Icons — CDN, always absolute, path-independent -->
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css">

  <style>
    /* ── All CSS is self-contained — no external relative assets ──────────
     * This file is served for any unknown path (e.g. /a/b/c/d/) so every
     * resource must be either inline or an absolute CDN/origin URL.
     * Never use relative paths (assets/*, ./*, ../*) in this file.
     * ─────────────────────────────────────────────────────────────────── */

    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e2b3c; border-radius: 99px; }

    /* Tokens — inlined from vars.css so no relative import needed */
    :root {
      --bg:       #060a10;
      --surface:  #0c1118;
      --border2:  #1e2b3c;
      --accent:   #4b9cf5;
      --text:     #e6edf3;
      --sub:      #8b949e;
      --muted:    #46546a;
      --r-sm:     9px;
      --r:        13px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Instrument Sans', system-ui, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Icon centring — same fix as base.css */
    i[class^="fi"], i[class*=" fi"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      flex-shrink: 0;
      vertical-align: middle;
    }
    i[class^="fi"]::before, i[class*=" fi"]::before { display: block; line-height: 1; }

    /* Background */
    .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(75,156,245,.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(75,156,245,.028) 1px, transparent 1px);
      background-size: 38px 38px;
      -webkit-mask-image: radial-gradient(ellipse 85% 55% at 50% 50%, #000 15%, transparent 100%);
              mask-image: radial-gradient(ellipse 85% 55% at 50% 50%, #000 15%, transparent 100%);
    }
    .bg-orb { position: absolute; border-radius: 50%; }
    .bg-orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(75,156,245,.065) 0%, transparent 70%); top: -200px; right: -100px; }
    .bg-orb-2 { width: 520px; height: 520px; background: radial-gradient(circle, rgba(192,132,252,.045) 0%, transparent 70%); bottom: -160px; left: -70px; }

    /* Page */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .nf {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      animation: fadeUp .4s ease both;
    }

    .nf-code {
      font-family: 'Syne', sans-serif;
      font-size: clamp(6rem, 18vw, 11rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.06em;
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(75,156,245,.2);
      margin-bottom: 10px;
      user-select: none;
    }
    .nf-code .z {
      -webkit-text-stroke: 1.5px rgba(75,156,245,.65);
      filter: drop-shadow(0 0 16px rgba(75,156,245,.22));
    }

    .nf-icon  { font-size: 1.7rem; color: var(--accent); margin-bottom: 16px; display: flex; }

    .nf-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 800;
      letter-spacing: -.04em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .nf-sub {
      font-size: .875rem;
      color: var(--sub);
      max-width: 340px;
      line-height: 1.75;
      margin: 0 auto 26px;
    }

    .nf-sub code {
      font-family: 'JetBrains Mono', monospace;
      font-size: .8em;
      color: var(--accent);
      background: rgba(75,156,245,.08);
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid rgba(75,156,245,.15);
      word-break: break-all;
    }

    .nf-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--accent);
      color: #fff;
      border-radius: var(--r-sm);
      font-family: 'Instrument Sans', sans-serif;
      font-size: .875rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .15s, transform .12s;
      margin-bottom: 28px;
      box-shadow: 0 2px 10px rgba(75,156,245,.3);
    }
    .nf-btn:hover { background: #3d8ee6; transform: translateY(-1px); }
    .nf-btn:active { transform: translateY(0); }

    .nf-path {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--r-sm);
      padding: 6px 14px;
      max-width: 420px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="bg-layer" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
  </div>

  <main class="nf" role="main">
    <div class="nf-code" aria-hidden="true">4<span class="z">0</span>4</div>
    <i class="fi fi-rr-search nf-icon" aria-hidden="true"></i>
    <h1 class="nf-title">Page not found</h1>
    <p class="nf-sub">The path <code id="np"></code> doesn't exist or has moved.</p>
    <a class="nf-btn" href="https://mrlipx.github.io/github-user-search/">
      <i class="fi fi-rr-home" aria-hidden="true"></i>Back home
    </a>
    <div class="nf-path" id="nu"></div>
  </main>

  <script>
    /* Inline JS — no external scripts, safe at any URL depth */
    (function () {
      var np = document.getElementById('np');
      var nu = document.getElementById('nu');
      if (np) np.textContent = location.pathname;
      if (nu) nu.textContent = location.href;
    }());
  </script>

</body>
</html>
