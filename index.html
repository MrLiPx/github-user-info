<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ── Primary SEO ── -->
  <title>GitHub User Search — Developer Profile Explorer</title>
  <meta name="description" content="Search any GitHub user and instantly explore their repositories, stars, followers, and developer stats in a clean, fast interface.">
  <meta name="keywords" content="GitHub, profile, lookup, developer, repositories, stats, analytics, open source">
  <meta name="author" content="MrLiPx">
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1">
  <link rel="canonical" href="https://mrlipx.github.io/github-user-search/">

  <!-- ── Open Graph ── -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="GitHub User Search">
  <meta property="og:locale"      content="en_US">
  <meta property="og:title"       content="GitHub User Search — Developer Profile Explorer">
  <meta property="og:description" content="Search any GitHub user and instantly explore their repositories, stars, followers, and developer stats.">
  <meta property="og:url"         content="https://mrlipx.github.io/github-user-search/">
  <meta property="og:image"       content="https://mrlipx.github.io/github-user-search/assets/logo.png">
  <meta property="og:image:width"  content="128">
  <meta property="og:image:height" content="128">
  <meta property="og:image:alt"    content="GitHub User Search logo">

  <!-- ── Twitter / X ── -->
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:site"        content="@MrLiPx">
  <meta name="twitter:creator"     content="@MrLiPx">
  <meta name="twitter:title"       content="GitHub User Search — Developer Profile Explorer">
  <meta name="twitter:description" content="Search any GitHub user and instantly explore their repositories, stars, followers, and developer stats.">
  <meta name="twitter:image"       content="https://mrlipx.github.io/github-user-search/assets/logo.png">

  <!-- ── Theme ── -->
  <meta name="theme-color" content="#4d9ef7">
  <meta name="color-scheme" content="dark">

  <!-- ── Structured Data ── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "GitHub User Search",
    "url": "https://mrlipx.github.io/github-user-search/",
    "description": "Search any GitHub user and explore their repositories, stars, and developer stats.",
    "author": { "@type": "Person", "name": "MrLiPx", "url": "https://github.com/MrLiPx" },
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Web"
  }
  </script>

  <!-- ── Favicon ── -->
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="apple-touch-icon"      href="assets/logo.png">

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <!-- ── Icons ── -->
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/4.0.0/uicons-brands/css/uicons-brands.css">

  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <!-- ══ Background ══ -->
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
  </div>

  <!-- ══ Nav ══ -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a class="nav-brand" href="." aria-label="GitHub User Search home" onclick="resetToLanding(); return false;">
        <div class="nav-logo" aria-hidden="true">
          <i class="fi fi-brands-github"></i>
        </div>
        <div class="nav-brand-text">
          <span class="nav-title">User Search</span>
          <span class="nav-sub"><span class="status-dot" aria-hidden="true"></span>GitHub API</span>
        </div>
      </a>

      <div class="search-wrap" role="search">
        <div class="search-box" id="searchBox">
          <i class="fi fi-rr-search search-icon" aria-hidden="true"></i>
          <input
            type="text"
            id="usernameInput"
            class="search-input"
            placeholder="Search a GitHub username…"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
            aria-label="GitHub username"
          >
          <kbd class="search-kbd" aria-label="Keyboard shortcut: Ctrl+K or Cmd+K" title="Ctrl K">⌘K</kbd>
        </div>
        <button class="search-btn" id="searchBtn" aria-label="Search">
          <i class="fi fi-rr-arrow-right" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- ══ Page shell ══ -->
  <div class="page-shell">

    <!-- Landing state -->
    <div id="landingUI" class="landing">
      <div class="landing-inner">
        <div class="landing-icon" aria-hidden="true">
          <i class="fi fi-brands-github"></i>
        </div>
        <h2 class="landing-title">Explore GitHub Profiles</h2>
        <p class="landing-sub">Type any GitHub username in the search bar to view their repositories, stars, followers, and more.</p>
        <div class="landing-examples" aria-label="Example searches">
          <span class="landing-label">Try:</span>
          <button class="example-chip" data-user="torvalds">torvalds</button>
          <button class="example-chip" data-user="sindresorhus">sindresorhus</button>
          <button class="example-chip" data-user="MrLiPx">MrLiPx</button>
        </div>
      </div>
    </div>

    <!-- Loading skeleton -->
    <div id="loadingUI" class="hidden" aria-live="polite" aria-busy="true">
      <div class="skeleton-hero">
        <div class="skel skel-avatar"></div>
        <div class="skel-body">
          <div class="skel skel-name"></div>
          <div class="skel skel-bio"></div>
          <div class="skel-stats">
            <div class="skel skel-stat"></div>
            <div class="skel skel-stat"></div>
            <div class="skel skel-stat"></div>
            <div class="skel skel-stat"></div>
          </div>
        </div>
      </div>
      <div class="skel-grid">
        <div class="skel skel-card"></div>
        <div class="skel skel-card"></div>
        <div class="skel skel-card"></div>
        <div class="skel skel-card"></div>
        <div class="skel skel-card"></div>
        <div class="skel skel-card"></div>
      </div>
    </div>

    <!-- Error state -->
    <div id="errorContainer" class="hidden error-wrap" role="alert" aria-live="assertive">
      <!-- filled by JS -->
    </div>

    <!-- Profile content -->
    <main id="profileContent" class="hidden profile-root" aria-live="polite">

      <!-- Hero -->
      <section class="hero-card" aria-label="Profile overview">
        <div class="hero-inner">

          <div class="avatar-col">
            <div class="avatar-ring" aria-hidden="true"></div>
            <img id="avatar" class="avatar-img" src="" alt="GitHub avatar" width="160" height="160" loading="lazy">
            <span id="hireableStatus" class="hire-badge hidden" aria-label="Open to work">HIREABLE</span>
          </div>

          <div class="hero-body">
            <div class="hero-top">
              <div>
                <h2 id="fullName" class="hero-name"></h2>
                <a id="loginLink" class="hero-handle" href="" target="_blank" rel="noopener noreferrer">
                  <i class="fi fi-rr-at" aria-hidden="true"></i><span id="loginId"></span>
                </a>
              </div>
              <div id="achievementsList" class="badges-row" role="list" aria-label="Achievements"></div>
            </div>

            <p id="bioText" class="hero-bio"></p>

            <div class="stats-row" role="list" aria-label="Stats">
              <div class="stat-pill" role="listitem">
                <span class="stat-num" id="statFollowers">—</span>
                <span class="stat-lbl">Followers</span>
              </div>
              <div class="stat-pill" role="listitem">
                <span class="stat-num" id="statFollowing">—</span>
                <span class="stat-lbl">Following</span>
              </div>
              <div class="stat-pill" role="listitem">
                <span class="stat-num" id="statRepos">—</span>
                <span class="stat-lbl">Repos</span>
              </div>
              <div class="stat-pill" role="listitem">
                <span class="stat-num" id="statGists">—</span>
                <span class="stat-lbl">Gists</span>
              </div>
            </div>

            <div class="meta-row">
              <div class="meta-item"><i class="fi fi-rr-calendar" aria-hidden="true"></i><span id="valJoined"></span></div>
              <div id="locBox"  class="meta-item hidden"><i class="fi fi-rr-marker"    aria-hidden="true"></i><span id="valLocation"></span></div>
              <div id="compBox" class="meta-item hidden"><i class="fi fi-rr-briefcase"  aria-hidden="true"></i><span id="valCompany"></span></div>
              <div id="linkBox" class="meta-item hidden"><i class="fi fi-rr-link"       aria-hidden="true"></i><a id="valBlog" target="_blank" rel="noopener noreferrer"></a></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Tabs -->
      <div class="tabs-bar" role="tablist" aria-label="Profile sections">
        <a href="#repos" id="tab-repos" class="tab active" role="tab" aria-selected="true"  aria-controls="reposView">
          <i class="fi fi-rr-layers"    aria-hidden="true"></i>Repositories
        </a>
        <a href="#stars" id="tab-stars" class="tab"        role="tab" aria-selected="false" aria-controls="starsView">
          <i class="fi fi-rr-star"      aria-hidden="true"></i>Starred
        </a>
      </div>

      <!-- Repos -->
      <div id="reposView" class="view-panel" role="tabpanel" aria-labelledby="tab-repos"></div>

      <!-- Stars -->
      <div id="starsView" class="view-panel hidden" role="tabpanel" aria-labelledby="tab-stars">
        <div id="starsLoading" class="panel-loading">
          <div class="spinner" aria-hidden="true"></div>
          <p class="panel-loading-text">Loading starred repos…</p>
        </div>
        <div id="starsGrid" class="repo-grid"></div>
      </div>

    </main>
  </div>

  <script src="assets/app.js" defer></script>
</body>
</html>
